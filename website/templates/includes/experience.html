<section id="experience" class="section">

    <div class="container">

        <div class="section-header">

            <h2>Experience</h2>

            <p>
                My journey in AI, Robotics and Industrial Automation.
            </p>

        </div>

        <div class="timeline">

            {% for exp in experiences %}

            <div class="timeline-item">

                <div class="timeline-dot"></div>

                <div class="timeline-content">

                    <h3>{{ exp.role }}</h3>

                    <h4>{{ exp.company }}</h4>

                    <span>{{ exp.duration }}</span>

                    <p>{{ exp.description }}</p>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</section>
